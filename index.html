<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قلب السكري - تقييم خطر أمراض القلب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <div class="logo">
          <span class="logo-heart">❤️</span>
          <span class="logo-text">قلب السكري</span>
        </div>
        <div class="nav-links">
          <a href="#accueil" class="nav-link">Accueil</a>
          <a href="#risk" class="nav-link">Évaluation du risque</a>
          <a href="#symptoms" class="nav-link">Symptômes</a>
          <a href="#exams" class="nav-link">Examens médicaux</a>
          <a href="#contact" class="nav-link">Contact</a>
        </div>
        <div class="nav-actions">
          <button class="login-btn"><a href="signUp/login.html" style="color: inherit; text-decoration: none;">LogIn</a></button>
          <button class="register-btn"><a href="signUp/signup.html" style="color: inherit; text-decoration: none;">SignUp</a></button>
        </div>
        <button class="menu-toggle" id="menuToggle">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <!-- ==================== القسم 1: Accueil ==================== -->
    <section class="hero" id="accueil">
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title">❤️ Cœur + soins + ECG</h1>
        </div>
        <div class="hero-image">
          <img src="image/img1.jfif" alt="Image: Cœur et soins" class="hero-img">
          <img src="image/img11.jfif" alt="Image: Soins cardiaques" class="hero-img">
          <img src="image/img12.jfif" alt="Image: ECG" class="hero-img">
        </div>
      </div>
    </section>

    <!-- ==================== القسم 2: Évaluation du risque ==================== -->
    <section class="risk-section" id="risk">
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title">❤️ Évaluation du risque</h1>
        </div>
        <div class="risk-images">
          <img src="image/img2.jfif" alt="Risk Image 1" class="risk-img">
          <img src="image/img22.jfif" alt="Risk Image 2" class="risk-img">
          <img src="image/img23.jfif" alt="Risk Image 3" class="risk-img">
        </div>
      </div>
    </section>
    
    <!-- ==================== القسم 3: Résultat ==================== -->
    <section class="result-section" id="result">
      <div class="container">
        <div class="result-content">
          <h1 class="hero-title">📊 Résultat(Risk Score)</h1>
        </div>
        <div class="result-images">
          <img src="image/img3.jfif" alt="Result Image 1" class="result-img">
          <img src="image/img32.jfif" alt="Result Image 2" class="result-img">
        </div>
      </div>
    </section>

  


        

  
        
    

   
      
   

  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2026 قلب السكري - موقع توعوي لمرضى السكري وأمراض القلب</p>
      <p class="footer-emergency">🚨 Urgence: Appelez le 14 ou 997</p>
    </div>
  </footer>

  <!-- Google Translate -->
  <div id="google_translate_element" class="translate-btn"></div>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'fr',
        includedLanguages: 'ar,fr,en',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script src="script.js"></script>
</body>
</html>
